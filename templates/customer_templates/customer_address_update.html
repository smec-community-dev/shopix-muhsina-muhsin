{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-10">
    <nav class="mb-6 flex items-center text-sm text-slate-500">
        <a href="{% url 'customer_address' %}" class="hover:text-amber-600">My Addresses</a>
        <span class="mx-2">/</span>
        <span class="text-slate-900 font-medium">Edit Address</span>
    </nav>

    <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
        <div class="bg-slate-50 border-b border-slate-200 p-6">
            <h1 class="text-xl font-bold text-slate-800">Update Address</h1>
        </div>

        <form method="POST" class="p-6 space-y-5">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Full Name</label>
                    <input type="text" name="full_name" value="{{ address.full_name }}" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Phone Number</label>
                    <input type="text" name="phone_number" value="{{ address.phone_number }}" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Pincode</label>
                    <input type="text" name="pincode" value="{{ address.pincode }}" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">House Info</label>
                    <input type="text" name="house_info" value="{{ address.house_info }}" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Locality</label>
                    <input type="text" name="locality" value="{{ address.locality }}" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Landmark</label>
                    <input type="text" name="landmark" value="{{ address.landmark|default:'' }}" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">City</label>
                    <input type="text" name="city" value="{{ address.city }}" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">State</label>
                    <input type="text" name="state" value="{{ address.state }}" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Address Type</label>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2">
                        <input type="radio" name="address_type" value="HOME" {% if address.address_type == 'HOME' %}checked{% endif %} class="text-amber-600">
                        <span class="text-sm">Home</span>
                    </label>
                    <label class="flex items-center gap-2">
                        <input type="radio" name="address_type" value="WORK" {% if address.address_type == 'WORK' %}checked{% endif %} class="text-amber-600">
                        <span class="text-sm">Work</span>
                    </label>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <input type="checkbox" name="is_default" id="is_default" {% if address.is_default %}checked{% endif %} class="w-4 h-4 text-amber-600 border-slate-300 rounded">
                <label for="is_default" class="text-sm text-slate-600">Set as default</label>
            </div>

            <div class="flex gap-4 pt-4 border-t">
                <button type="submit" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-amber-100">
                    Update Address
                </button>
                <a href="{% url 'customer_address' %}" class="flex-1 bg-white border border-slate-300 text-slate-700 font-semibold py-3 rounded-xl text-center hover:bg-slate-50">
                    Back
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
