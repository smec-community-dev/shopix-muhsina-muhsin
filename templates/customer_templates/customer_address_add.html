{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-10">
    <nav class="mb-6 flex items-center text-sm text-slate-500">
        <a href="{% url 'customer_address' %}" class="hover:text-amber-600">My Addresses</a>
        <span class="mx-2">/</span>
        <span class="text-slate-900 font-medium">Add New</span>
    </nav>

    <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
        <div class="bg-slate-50 border-b border-slate-200 p-6">
            <h1 class="text-xl font-bold text-slate-800">Add New Shipping Address</h1>
            <p class="text-slate-500 text-sm">Fill in the details for Shopix delivery.</p>
        </div>

        <form method="POST" class="p-6 space-y-5">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Full Name</label>
                    <input type="text" name="full_name" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Phone Number</label>
                    <input type="text" name="phone_number" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Pincode</label>
                    <input type="text" name="pincode" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">House/Building No.</label>
                    <input type="text" name="house_info" required placeholder="Flat, House no, Building, Apartment" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Locality/Area</label>
                    <input type="text" name="locality" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">City/District</label>
                    <input type="text" name="city" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">State</label>
                    <input type="text" name="state" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Landmark (Optional)</label>
                    <input type="text" name="landmark" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition" placeholder="Near [school/market/etc]">
                </div>
            </div>

            <div class="pt-2">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Address Type</label>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="adress_type" value="HOME" checked class="text-amber-600 focus:ring-amber-500">
                        <span class="text-sm text-slate-600">Home</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="adress_type" value="WORK" class="text-amber-600 focus:ring-amber-500">
                        <span class="text-sm text-slate-600">Work</span>
                    </label>
                </div>
            </div>

            <div class="flex items-center gap-2 py-2">
                <input type="checkbox" name="is_default" id="is_default" class="w-4 h-4 text-amber-600 border-slate-300 rounded focus:ring-amber-500">
                <label for="is_default" class="text-sm text-slate-600 select-none">Make this my primary address</label>
            </div>

            <div class="flex gap-4 pt-4 border-t border-slate-100">
                <button type="submit" class="flex-1 bg-slate-900 hover:bg-black text-white font-bold py-3 rounded-xl transition shadow-lg shadow-slate-200">
                    Save Address
                </button>
                <a href="{% url 'customer_address' %}" class="flex-1 bg-white border border-slate-300 text-slate-700 font-semibold py-3 rounded-xl text-center hover:bg-slate-50 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
