{% extends 'admin_templates/base.html' %}

{% block content %}
<div class="max-w-xl mx-auto bg-white p-8 rounded-2xl border border-gray-100 shadow-sm">
    <h1 class="text-2xl font-bold mb-6 text-gray-900">{{ title }} Category</h1>
    
    <form method="POST" enctype="multipart/form-data" class="space-y-5">
        {% csrf_token %}
        
        {% for field in form %}
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}

        <div class="pt-4 flex gap-3">
            <button type="submit" class="flex-1 bg-amber-600 text-white py-3 rounded-xl font-bold hover:bg-amber-700 transition-colors">
                Save Category
            </button>
            <a href="{% url 'categorymanagement' %}" class="px-6 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 transition-colors">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
