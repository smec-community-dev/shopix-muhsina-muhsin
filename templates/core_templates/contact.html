<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Support</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .contact-container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border-top: 5px solid #FFBF00; /* Amber Border */
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #000000;
        }

        p {
            color: #555;
            margin-bottom: 30px;
        }

        .contact-method {
            margin: 20px 0;
        }

        .label {
            display: block;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: #FFBF00; /* Amber Text */
            margin-bottom: 5px;
        }

        .value {
            font-size: 1.2rem;
            color: #000000;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .value:hover {
            color: #FFBF00;
        }

        .divider {
            height: 1px;
            background-color: #eee;
            margin: 20px auto;
            width: 50%;
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <h1>Contact Us</h1>
        <p>Our team is here to help. Reach out to us via any of the channels below.</p>

        <div class="contact-method">
            <span class="label">Support Phone</span>
            <a href="tel:+18005550199" class="value">+1 (800) 555-0199</a>
        </div>

        <div class="divider"></div>

        <div class="contact-method">
            <span class="label">Email Address</span>
            <a href="mailto:support@shopix.com" class="value">support@shopix.com</a>
        </div>
    </div>

</body>
</html>
