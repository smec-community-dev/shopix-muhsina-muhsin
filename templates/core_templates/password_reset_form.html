<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">

    <h2 class="text-xl font-bold mb-4 text-center">Reset Password</h2>

    <form method="post">
        {% csrf_token %}

        <div class="space-y-4">

            <input type="email" name="email" required
                placeholder="Enter your email"
                class="w-full border-b-2 border-gray-300 focus:border-amber-500 outline-none py-2 px-1">

            {% if form.errors %}
                <p class="text-red-500 text-sm">{{ form.errors }}</p>
            {% endif %}

            <button type="submit"
                class="w-full bg-amber-500 text-white py-2 rounded-lg hover:bg-amber-600 transition">
                Send Reset Link
            </button>

        </div>
    </form>

</div>

</body>
</html>
