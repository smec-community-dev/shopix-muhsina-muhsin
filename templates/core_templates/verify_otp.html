<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        /* Firefox */
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>

<body class="bg-white text-black min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.05)] p-8 md:p-12 text-center">
        
        <div class="mx-auto w-16 h-16 bg-amber-50 rounded-full flex items-center justify-center mb-6">
            <svg class="w-8 h-8 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
            </svg>
        </div>

        <h2 class="text-2xl font-bold tracking-tight mb-2">Check your email</h2>
        <p class="text-gray-500 text-sm leading-relaxed mb-8">
            We’ve sent a temporary verification code to your inbox. Enter the code below to secure your account.
        </p>

        {% if messages %}
        <div class="mb-6 space-y-2">
            {% for message in messages %}
            <div class="bg-red-50 border border-red-100 text-red-700 px-4 py-3 rounded-lg text-sm font-medium">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="relative">
                <input 
                    type="text" 
                    name="otp" 
                    placeholder="0 0 0 0 0 0" 
                    inputmode="numeric" 
                    pattern="\d{6}" 
                    maxlength="6"
                    autocomplete="one-time-code" 
                    required
                    class="w-full text-center text-3xl font-bold tracking-[0.75rem] py-4 bg-gray-50 border-2 border-gray-100 rounded-xl outline-none transition-all focus:border-amber-400 focus:bg-white focus:ring-4 focus:ring-amber-400/10"
                >
            </div>
            
            <button type="submit" class="w-full py-4 bg-amber-400 hover:bg-amber-500 text-black font-bold rounded-xl shadow-lg shadow-amber-200 transition-all active:scale-[0.98]">
                Verify Identity
            </button>
        </form>

        <div class="mt-10 pt-8 border-t border-gray-50 text-sm text-gray-500">
            Didn't receive the code? 
            <div class="mt-2">
                <span id="timer-text" class="font-medium text-black">
                    Wait <span class="timer font-bold" id="countdown">00:59</span>
                </span>
                <a href="#" id="resend-link" class="hidden text-amber-600 font-bold hover:text-amber-700 hover:underline transition-colors">
                    Resend Code
                </a>
            </div>
        </div>
    </div>

    <script>
        let timeLeft = 59;
        const countdownElem = document.getElementById('countdown');
        const timerText = document.getElementById('timer-text');
        const resendLink = document.getElementById('resend-link');

        const timer = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timer);
                timerText.classList.add('hidden');
                resendLink.classList.remove('hidden');
            } else {
                let seconds = timeLeft < 10 ? '0' + timeLeft : timeLeft;
                countdownElem.innerHTML = `00:${seconds}`;
            }
            timeLeft -= 1;
        }, 1000);
    </script>

</body>
</html>
